<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>overflow 비교</title>
    <style>
        body {
            display: flex;
            gap: 40px;
            padding: 40px;
            font-family: sans-serif;
            background: #f5f5f5;
        }

        .box {
            width: 150px;
            height: 120px;
            background-color: #fff;
            border: 3px solid #333;
            padding: 8px;
        }

        /* 4가지 overflow */
        .visible { overflow: visible; }
        .hidden  { overflow: hidden; }
        .scroll  { overflow: scroll; }
        .auto    { overflow: auto; }

        /* 박스보다 큰 내용 */
        .content {
            width: 200px;       /* 박스(150px)보다 넓음 */
            background: #ff9999;
            padding: 4px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
    </style>
</head>
<body>

    <div>
        <label>visible (기본값)</label>
        <div class="box visible">
            <div class="content">
                넘쳐도 그냥 다 보임. 빨간 박스가 경계선 밖으로 튀어나옴.
            </div>
        </div>
    </div>

    <div>
        <label>hidden</label>
        <div class="box hidden">
            <div class="content">
                넘친 부분이 잘려서 안보임. 빨간 박스가 경계선에서 잘림.
            </div>
        </div>
    </div>

    <div>
        <label>scroll</label>
        <div class="box scroll">
            <div class="content">
                스크롤바가 항상 생김. 넘친 내용은 스크롤해서 볼 수 있음.
            </div>
        </div>
    </div>

    <div>
        <label>auto</label>
        <div class="box auto">
            <div class="content">
                넘칠 때만 스크롤바 생김. 안넘치면 스크롤바 없음.
            </div>
        </div>
    </div>

</body>
</html>
