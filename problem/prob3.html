<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .card-wrap {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .card {
            flex: 1;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-weight: bold;
        }

        #num1 { background-color: #a8e6a3; }
        #num2 { background-color: #f9e79f; }
        #num3 { background-color: #a9cce3; }

        @media (max-width: 600px) {
            .card-wrap {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <section>
        <div class="card-wrap">
            <div class="card" id="num1">카드1</div>
            <div class="card" id="num2">카드2</div>
            <div class="card" id="num3">카드3</div>
        </div>
    </section>
</body>
</html>
