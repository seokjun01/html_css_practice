<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>미니 HTML 프로젝트</title>
        <style>
           body {
            background-color: #f5f5f5;
            font-family: sans-serif;
           }

           h1 {
            text-align: center;
            color: #333;
           }

           form {
            background-color: white;
            padding: 30px;
            margin: 30px auto;
            width: 400px;
            border-radius: 10px;
           }

           label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
           }

           input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
           }

           button {
            width: 100%;
            padding: 10px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
           }
        </style>
    </head>
    <body>
        <header>
            <h1>회원가입 페이지</h1>
        </header>
        
        <button class="btn-blue">파란 버튼</button>
        <button class="btn-red">빨간 버튼</button>
        <main>
            <form>
                <label for="text">이름</label>
                <input type="text" id="text" placeholder="이름입력"><br>
                
                <label for="email">이메일</label>
                <input type="email" id="email" placeholder="이메일 입력"><br>

                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호 입력"><br>

                <label for="date">생년월일</label>
                <input type="date"  id="date"><br>

               <input type="radio" name="gender" id="male">
               <label for="male">남성</label>
               <input type="radio" name="gender" id="female">
               <label for="female">여성</label><br>

               

                <label><strong>관심사</strong></label><br>
                <input type="checkbox" name="interest" id="backend" value="backend">
                <label for="backend">백엔드</label>
                <input type="checkbox" name="interest" id="frontend" value="frontend">
                <label for="frontend">프론트엔드</label>
                <input type="checkbox" name="interest" id="infra" value="infra">
                <label for="infra">인프라</label><br>


                <button type="submit">제출하기</button>
            </form>
            

            <footer>
                <h3>내가 만들어본 회원가입 페이지</h3>
            </footer>
        </main>
        
    </body>
</html>
